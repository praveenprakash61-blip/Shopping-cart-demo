name: Playwright-Enterprise-Framework-$(Date:yyyyMMdd)-$(Rev:r)

trigger:
  branches:
    include:
      - main
      - develop

pr:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'windows-latest'

variables:
  NODE_VERSION: '20.x'
  TEST_ENV: 'qa'

steps:

# Checkout Source Code
- checkout: self
  displayName: 'Checkout Repository'

# Install Node.js
- task: UseNode@1
  displayName: 'Install Node.js'
  inputs:
    version: $(NODE_VERSION)

# Cache npm packages
- task: Cache@2
  displayName: 'Cache npm Packages'
  inputs:
    key: 'npm | "$(Agent.OS)" | package-lock.json'
    path: $(Pipeline.Workspace)/.npm

# Install Project Dependencies
- script: |
    npm ci --cache $(Pipeline.Workspace)/.npm
  displayName: 'Install Project Dependencies'

# Install Playwright Browsers
- script: |
    npx playwright install --with-deps
  displayName: 'Install Playwright Browsers'

# Execute Playwright Tests
- script: |
    npx playwright test
  displayName: 'Execute Playwright Tests'
  env:
    TEST_ENV: $(TEST_ENV)

# Publish JUnit Test Results
- task: PublishTestResults@2
  displayName: 'Publish JUnit Test Results'
  condition: always()
  inputs:
    testResultsFormat: 'JUnit'
    testResultsFiles: 'test-results/results.xml'
    failTaskOnFailedTests: true
    testRunTitle: 'Playwright Automation Results'

# Publish HTML Report
- task: PublishPipelineArtifact@1
  displayName: 'Publish Playwright HTML Report'
  condition: always()
  inputs:
    targetPath: 'playwright-report'
    artifact: 'PlaywrightReport'

# Publish Screenshots, Videos & Traces
- task: PublishPipelineArtifact@1
  displayName: 'Publish Test Artifacts'
  condition: always()
  inputs:
    targetPath: 'test-results'
    artifact: 'TestArtifacts'